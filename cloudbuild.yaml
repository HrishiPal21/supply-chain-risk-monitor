steps:
  # Pull the latest image to use as cache
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        docker pull us-central1-docker.pkg.dev/$PROJECT_ID/supply-chain/app:latest || true

  # Build using cache from the latest image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--cache-from'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/supply-chain/app:latest'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/supply-chain/app:$COMMIT_SHA'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/supply-chain/app:latest'
      - '.'

  # Push both tags
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'us-central1-docker.pkg.dev/$PROJECT_ID/supply-chain/app:$COMMIT_SHA']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'us-central1-docker.pkg.dev/$PROJECT_ID/supply-chain/app:latest']

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'supply-chain-risk'
      - '--image=us-central1-docker.pkg.dev/$PROJECT_ID/supply-chain/app:$COMMIT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      - '--add-cloudsql-instances=$PROJECT_ID:us-central1:supply-chain-db'
      - '--update-env-vars=CLOUD_SQL_CONNECTION_NAME=$PROJECT_ID:us-central1:supply-chain-db,POSTGRES_DB=supply_chain,POSTGRES_USER=postgres,POSTGRES_HOST=localhost,POSTGRES_PORT=5432'
      - '--update-secrets=OPENAI_API_KEY=OPENAI_API_KEY:latest,PINECONE_API_KEY=PINECONE_API_KEY:latest,NEWS_API_KEY=NEWS_API_KEY:latest,EDGAR_EMAIL=EDGAR_EMAIL:latest,POSTGRES_PASSWORD=POSTGRES_PASSWORD:latest'
      - '--quiet'

images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/supply-chain/app:$COMMIT_SHA'
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/supply-chain/app:latest'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'
